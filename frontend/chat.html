<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由对话 | 旅游问答评估系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="/">🏠 欢迎</a>
            <a href="/test">📝 标准化测试</a>
            <a href="/eval">📊 模型评估</a>
            <a href="/chat" class="active">💬 自由对话</a>
        </nav>

        <h1>💬 自由对话</h1>
        <p class="subtitle">输入任意问题，选择模型和模式，获取回答并可评估准确性。</p>

        <div class="control-bar">
            <div class="control-group">
                <label>🤖 生成模型：</label>
                <select id="modelSelect">
                    <option value="R1">DeepSeek-R1</option>
                    <option value="V3">DeepSeek-V3</option>
                </select>
            </div>
            <div class="control-group">
                <label>🔍 模式：</label>
                <select id="modeSelect">
                    <option value="pure">纯模型</option>
                    <option value="rag">RAG（检索增强）</option>
                    <option value="collab">🤝 合作模式（R1思考→V3总结）</option>
                </select>
            </div>
            <div class="control-group" id="retrievalStrategyGroup" style="display: none;">
                <label>⚙️ 检索方式：</label>
                <select id="retrievalMode">
                    <option value="hybrid">混合检索</option>
                    <option value="semantic">纯语义检索</option>
                    <option value="keyword">纯关键词检索</option>
                </select>
            </div>
        </div>

        <div class="chat-input-area">
            <textarea id="userQuery" rows="6" placeholder="输入你的问题..." style="width:100%; font-size:1rem; padding:12px;"></textarea>
            <button id="sendBtn" class="btn primary">发送</button>
        </div>

        <div class="result-panel">
            <h3>📝 回答</h3>
            <div id="answerBox" class="answer-box"></div>
            <div class="metrics">
                <span>⏱️ 响应时间：<span id="responseTime">-</span> 秒</span>
                <span>📚 检索文档数：<span id="chunkCount">-</span></span>
            </div>
            <div class="eval-buttons">
                <button id="accurateBtn" class="btn accurate">✓ 准确</button>
                <button id="inaccurateBtn" class="btn inaccurate">✗ 不准确</button>
            </div>
            <div id="evalMessage" class="eval-message"></div>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
