<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型评估看板 | 旅游问答评估系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="/">🏠 欢迎</a>
            <a href="/test">📝 标准化测试</a>
            <a href="/eval" class="active">📊 模型评估</a>
            <a href="/chat">💬 自由对话</a>
        </nav>

        <h1>📊 模型评估看板</h1>
        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <button id="manualRefreshBtn" class="btn secondary">🔄 手动刷新</button>
        </div>

        <!-- 第一行：整体准确率和响应时间对比（纯模型 vs RAG vs 合作模式） -->
        <div class="stats-grid">
            <div class="chart-container"><canvas id="overallAccuracyChart" width="400" height="300"></canvas></div>
            <div class="chart-container"><canvas id="overallTimeChart" width="400" height="300"></canvas></div>
            <div class="chart-container"><canvas id="avgRetrievedChart" width="400" height="300"></canvas></div>
        </div>

        <!-- 第二行：问题类型准确率 + 检索方式准确率 + 检索方式响应时间 -->
        <div class="stats-grid">
            <div class="chart-container"><canvas id="questionTypeAccChart" width="400" height="300"></canvas></div>
            <div class="chart-container"><canvas id="retrievalAccChart" width="400" height="300"></canvas></div>
            <div class="chart-container"><canvas id="retrievalTimeChart" width="400" height="300"></canvas></div>
        </div>

        <!-- 第三行：模型对比（R1 vs V3）+ 合作模式组合对比 -->
        <div class="stats-grid">
            <div class="chart-container"><canvas id="modelCompareChart" width="400" height="300"></canvas></div>
            <div class="chart-container"><canvas id="collabCompareChart" width="400" height="300"></canvas></div>
        </div>

        <!-- 第四行：雷达图（全尺寸） -->
        <div class="chart-container" style="width: 100%;">
            <canvas id="radarChart" width="800" height="400"></canvas>
        </div>
    </div>

    <script src="/static/eval.js"></script>
</body>
</html>
